<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300" opacity="0.06">
  <style>
    .line { fill: none; stroke: #475569; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  
  <!-- Icon 1: Book Stack (Top Left Area) -->
  <g transform="translate(40, 40) scale(1.2)">
    <!-- Bottom Book -->
    <path class="line" d="M 2 18 L 22 18 C 24 18, 24 22, 22 22 L 2 22 Z" />
    <path class="line" d="M 22 18 L 42 18 C 44 18, 44 22, 42 22 L 22 22" />
    <path class="line" d="M 22 2 L 22 18" />
    <!-- Middle Book -->
    <path class="line" d="M 4 10 L 22 10 C 24 10, 24 14, 22 14 L 4 14 Z" />
    <path class="line" d="M 22 10 L 40 10 C 42 10, 42 14, 40 14 L 22 14" />
    <!-- Top Open Book -->
    <path class="line" d="M 22 6 C 14 6, 8 2, 6 2 L 6 10 C 8 10, 14 14, 22 14" />
    <path class="line" d="M 22 6 C 30 6, 36 2, 38 2 L 38 10 C 36 10, 30 14, 22 14" />
  </g>

  <!-- Icon 2: Quill & Inkwell (Center Right Area) -->
  <g transform="translate(180, 100) scale(1.1)">
    <!-- Inkwell Base -->
    <path class="line" d="M 10 24 L 30 24 L 34 34 L 6 34 Z" />
    <rect class="line" x="12" y="16" width="16" height="8" rx="1" />
    <!-- Quill Feather -->
    <path class="line" d="M 16 20 C 16 12, 22 4, 34 2" />
    <path class="line" d="M 34 2 C 32 8, 28 14, 24 18" />
    <path class="line" d="M 22 11 L 26 10" />
    <path class="line" d="M 25 7 L 29 6" />
    <path class="line" d="M 19 15 L 22 15" />
  </g>

  <!-- Icon 3: Star & Checkmark (Bottom Left Area) -->
  <g transform="translate(50, 190) scale(1.1)">
    <!-- Checkmark Badge -->
    <circle class="line" cx="20" cy="20" r="14" stroke-dasharray="3 3" />
    <path class="line" d="M 13 20 L 18 25 L 27 15" />
    <!-- Small Decorative Sparkle/Star -->
    <path class="line" d="M 38 8 L 40 12 L 44 14 L 40 16 L 38 20 L 36 16 L 32 14 L 36 12 Z" stroke-width="1" />
  </g>
</svg>
