<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" style="width: 100%; height: 100%;" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Deep Royal Indigo Base Gradient -->
    <linearGradient id="sky-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#e0e7ff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.3" />
    </linearGradient>

    <!-- Cloud Layer 1: Bright Indigo to Violet-Blue -->
    <radialGradient id="indigo-cloud-1" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25" />
      <stop offset="50%" stop-color="#4f46e5" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#312e81" stop-opacity="0" />
    </radialGradient>

    <!-- Cloud Layer 2: Deep Midnight Indigo to Slate Purple -->
    <radialGradient id="indigo-cloud-2" cx="70%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#4338ca" stop-opacity="0.2" />
      <stop offset="60%" stop-color="#3730a3" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0" />
    </radialGradient>

    <!-- Cloud Layer 3: Ethereal Light Slate Indigo -->
    <radialGradient id="indigo-cloud-3" cx="20%" cy="75%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.15" />
      <stop offset="70%" stop-color="#6366f1" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0" />
    </radialGradient>

    <!-- Technical Analytical Dot Matrix Overlay -->
    <pattern id="dot-matrix" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#4f46e5" opacity="0.12" />
    </pattern>

    <style>
    <![CDATA[
      @keyframes cloudDriftOne {
        0% { transform: translate(0px, 0px) scale(1) rotate(0deg); opacity: 0.8; }
        33% { transform: translate(60px, -40px) scale(1.08) rotate(3deg); opacity: 0.95; }
        66% { transform: translate(-30px, 20px) scale(0.95) rotate(-2deg); opacity: 0.7; }
        100% { transform: translate(0px, 0px) scale(1) rotate(0deg); opacity: 0.8; }
      }

      @keyframes cloudDriftTwo {
        0% { transform: translate(0px, 0px) scale(1) rotate(0deg); opacity: 0.7; }
        50% { transform: translate(-70px, -50px) scale(1.15) rotate(-4deg); opacity: 0.9; }
        100% { transform: translate(0px, 0px) scale(1) rotate(0deg); opacity: 0.7; }
      }

      @keyframes floatIcon {
        0%, 100% { transform: translateY(0px) scale(1); opacity: 0.25; }
        50% { transform: translateY(-20px) scale(1.08); opacity: 0.55; }
      }

      .cloud-group-1 { animation: cloudDriftOne 35s ease-in-out infinite; transform-origin: 40% 30%; mix-blend-mode: multiply; }
      .cloud-group-2 { animation: cloudDriftTwo 45s ease-in-out infinite; transform-origin: 70% 60%; mix-blend-mode: multiply; }
      
      /* Target styles for individual floating academic elements */
      .icon-cap { animation: floatIcon 9s ease-in-out infinite; transform-origin: 180px 140px; }
      .icon-book { animation: floatIcon 13s ease-in-out infinite; transform-origin: 1250px 220px; }
      .icon-microscope { animation: floatIcon 11s ease-in-out infinite; transform-origin: 120px 640px; }
      .icon-cap-right { animation: floatIcon 15s ease-in-out infinite; transform-origin: 1300px 700px; }
    ]]>
    </style>
  </defs>

  <!-- Background Base Canvas -->
  <rect width="1440" height="900" fill="url(#sky-base)" />

  <!-- Matrix Background Overlay -->
  <rect width="1440" height="900" fill="url(#dot-matrix)" />

  <!-- Cloud Layer 1 -->
  <g class="cloud-group-1">
    <path d="M 100,200 Q 250,100 450,150 T 850,100 T 1200,250 Q 1350,400 1100,550 T 600,600 T 200,450 Z" fill="url(#indigo-cloud-1)" filter="blur(50px)" />
  </g>

  <!-- Cloud Layer 2 -->
  <g class="cloud-group-2">
    <path d="M 500,400 Q 700,250 950,300 T 1350,350 Q 1500,550 1300,700 T 800,750 T 450,550 Z" fill="url(#indigo-cloud-2)" filter="blur(65px)" />
  </g>

  <!-- ================= DYNAMIC ACADEMIC ACCENTS ================= -->

  <!-- Top Left Accent: Graduation Mortarboard Cap (🎓 concept) -->
  <g class="icon-cap" fill="#4f46e5">
    <path d="M 180,130 L 215,115 L 250,130 L 215,145 Z" />
    <path d="M 195,137 L 195,152 Q 215,162 235,152 L 235,137" opacity="0.8" />
    <path d="M 245,132 L 252,148 L 250,150" stroke="#4f46e5" stroke-width="1.5" fill="none" />
    <circle cx="250" cy="151" r="2" />
  </g>

  <!-- Top Right Accent: Open Book / Rubric Pages (📖 concept) -->
  <g class="icon-book" fill="#6366f1">
    <path d="M 1230,220 Q 1245,215 1260,223 Q 1275,215 1290,223 L 1290,243 Q 1275,235 1260,243 Q 1245,235 1230,243 Z" />
    <line x1="1260" y1="223" x2="1260" y2="243" stroke="#f8fafc" stroke-width="1.5" opacity="0.6" />
  </g>

  <!-- Bottom Left Accent: Research Microscope (🔬 concept) -->
  <g class="icon-microscope" stroke="#4f46e5" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M 120,660 L 145,660" stroke-width="3" /> <!-- Base -->
    <path d="M 128,660 L 128,640 Q 128,625 140,625" /> <!-- Arm -->
    <path d="M 142,620 L 132,635" stroke-width="3" /> <!-- Objective Tube -->
    <circle cx="140" cy="648" r="3" fill="#4f46e5" stroke="none" /> <!-- Stage/Sample -->
  </g>

  <!-- Bottom Right Accent: Secondary Floating Cap -->
  <g class="icon-cap-right" fill="#4f46e5" transform="scale(0.85) translate(220, 80)">
    <path d="M 1260,680 L 1295,665 L 1330,680 L 1295,695 Z" />
    <path d="M 1275,687 L 1275,702 Q 1295,712 1315,702 L 1315,687" opacity="0.8" />
  </g>

</svg>
